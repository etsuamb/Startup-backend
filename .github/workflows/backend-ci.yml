name: backend-ci

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: startupconnect
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: startupconnect
      JWT_SECRET: change_this_to_a_long_secret
      PORT: 3000
      REDIS_URL: redis://127.0.0.1:6379
      BASE_URL: http://127.0.0.1:3000

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          mkdir -p uploads
          cp .env.example .env

      - name: Run migration and seed data
        run: |
          node scripts/run_migration.js
          node scripts/seed_db.js
          node scripts/reset_admin_password.js

      - name: Start server
        run: |
          npm start > ../server.log 2>&1 &
          echo $! > ../server.pid

      - name: Wait for server
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Server did not start"
          cat ../server.log
          exit 1

      - name: Run backend smoke tests
        run: npm run test-all

      - name: Show server log on failure
        if: failure()
        run: cat ../server.log || true
